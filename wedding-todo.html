<style>

// ── SUPABASE SYNC ─────────────────────────────────────────────────────────────
const SB_URL = 'https://xoqamngvqhgancbjmkvu.supabase.co';
const SB_KEY = 'sb_publishable_rhkoY7C-OqoHJSYQSfsdVg_WQbiPfZg';

async function sbFetch(path, opts) {
  opts = opts || {};
  const res = await fetch(SB_URL + path, {
    method: opts.method || 'GET',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || ''
    },
    body: opts.body || undefined
  });
  if (!res.ok) { const t = await res.text(); console.error('Supabase error:', res.status, t); return null; }
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

async function loadFromSupabase(pageKey, stateRef, onLoaded) {
  showSyncStatus('loading');
  try {
    const rows = await sbFetch('/rest/v1/wedding_state?page_key=eq.' + pageKey + '&select=state,updated_at');
    if (rows && rows.length > 0 && rows[0].state) {
      Object.assign(stateRef, rows[0].state);
      lastUpdatedAt = rows[0].updated_at;
    }
  } catch(e) { console.warn('Supabase load failed, using defaults:', e); }
  onLoaded();
  hideSyncStatus();
  startPolling(pageKey, stateRef, onLoaded);
}

async function saveToSupabase(pageKey, stateRef) {
  showSyncStatus('saving');
  try {
    const body = JSON.stringify({ page_key: pageKey, state: stateRef, updated_at: new Date().toISOString() });
    await sbFetch('/rest/v1/wedding_state', {
      method: 'POST',
      prefer: 'resolution=merge-duplicates',
      body: body
    });
  } catch(e) { console.warn('Supabase save failed:', e); }
  hideSyncStatus();
}

let lastUpdatedAt = null;
function startPolling(pageKey, stateRef, onLoaded) {
  setInterval(async function() {
    try {
      const rows = await sbFetch('/rest/v1/wedding_state?page_key=eq.' + pageKey + '&select=state,updated_at');
      if (rows && rows.length > 0) {
        if (lastUpdatedAt !== null && rows[0].updated_at !== lastUpdatedAt) {
          Object.assign(stateRef, rows[0].state);
          onLoaded();
        }
        lastUpdatedAt = rows[0].updated_at;
      }
    } catch(e) {}
  }, 8000);
}

function showSyncStatus(mode) {
  var el = document.getElementById('syncStatus');
  if (!el) {
    el = document.createElement('div');
    el.id = 'syncStatus';
    el.style.cssText = 'position:fixed;bottom:16px;right:16px;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;font-family:"DM Sans",sans-serif;z-index:9999;transition:opacity 0.4s;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,0.1);';
    document.body.appendChild(el);
  }
  el.style.opacity = '1';
  if (mode === 'loading') {
    el.style.background = '#EBF4FA'; el.style.color = '#4A7FA5'; el.textContent = '↓ Loading…';
  } else {
    el.style.background = '#EAF5EC'; el.style.color = '#3A7D55'; el.textContent = '✓ Saved';
  }
}
function hideSyncStatus() {
  setTimeout(function() {
    var el = document.getElementById('syncStatus');
    if (el) el.style.opacity = '0';
  }, 1400);
}

const SK = 'wedding-v4';
let S = { checked:{}, assignees:{}, dues:{}, collapsed:{}, comments:{} };

function persist() { saveToSupabase(SK, S); }

function seedDefaults() {
  CATS.forEach(cat => cat.items.forEach(it => {
    if (S.assignees[it.id] === undefined) S.assignees[it.id] = it.a || '';
    if (S.dues[it.id] === undefined)      S.dues[it.id]      = it.d || '';
  }));
}

function onStateLoaded() {
  seedDefaults();
  render();
  updateProgress();
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
const AM = {
  '':      { label:'Assign…', cls:'ap-none',   dot:'#CCC' },
  evan:    { label:'Evan',    cls:'ap-evan',   dot:'var(--evan)' },
  shiwei:  { label:'Shi Wei', cls:'ap-shiwei', dot:'var(--shiwei)' },
  both:    { label:'Both',    cls:'ap-both',   dot:'var(--both)' },
};

function dueCls(iso) {
  if (!iso) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(iso);
  const diff = (d - today) / 86400000;
  if (diff < 0) return 'due-overdue';
  if (diff <= 14) return 'due-soon';
  return '';
}

let activeFilter = 'all';
let openDD = null;

function matchFilter(id) {
  if (activeFilter === 'all') return true;
  if (activeFilter === 'unassigned') return !S.assignees[id];
  return S.assignees[id] === activeFilter;
}

// ── PROGRESS ───────────────────────────────────────────────────────────────────
function updateProgress() {
  const all = CATS.flatMap(c => c.items);
  const vis = all.filter(i => matchFilter(i.id));
  const done = vis.filter(i => S.checked[i.id]).length;
  const total = vis.length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('pcnt').textContent = done+' / '+total;
  document.getElementById('pbar').style.width = pct+'%';
  document.getElementById('ppct').textContent = pct+'% complete';
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  CATS.forEach(cat => {
    const visible = cat.items.filter(i => matchFilter(i.id));
    if (!visible.length) return;

    const catDone = visible.filter(i => S.checked[i.id]).length;
    const collapsed = S.collapsed[cat.id];

    const card = document.createElement('div');
    card.className = 'category';

    // — Header —
    const hdr = document.createElement('div');
    hdr.className = 'cat-header';
    hdr.innerHTML = `
      <div class="cat-header-left">
        <span class="cat-emoji">${cat.emoji}</span>
        <span class="cat-title">${cat.label}</span>
      </div>
      <div class="cat-header-right">
        <span class="cat-badge${catDone===visible.length?' done':''}">${catDone}/${visible.length}</span>
        <span class="cat-chevron${collapsed?' closed':''}">▾</span>
      </div>`;
    hdr.addEventListener('click', () => {
      S.collapsed[cat.id] = !S.collapsed[cat.id];
      persist(); render(); updateProgress();
    });
    card.appendChild(hdr);

    if (!collapsed) {
      const wrap = document.createElement('div');
      wrap.className = 'cat-items';

      visible.forEach(item => {
        const isDone     = !!S.checked[item.id];
        const assignee   = S.assignees[item.id] || '';
        const dueVal     = S.dues[item.id] || '';
        const am         = AM[assignee] || AM[''];

        const row = document.createElement('div');
        row.className = 'item' + (isDone ? ' is-done' : '');

        // Checkbox
        const box = document.createElement('div');
        box.className = 'checkbox';
        box.style.background = isDone ? cat.color : 'transparent';
        box.style.border = isDone ? 'none' : '2px solid #C8BFB0';
        box.textContent = isDone ? '✓' : '';
        box.addEventListener('click', e => {
          e.stopPropagation();
          S.checked[item.id] = !S.checked[item.id];
          persist(); render(); updateProgress();
        });

        // Body
        const body = document.createElement('div');
        body.className = 'item-body';

        const txt = document.createElement('span');
        txt.className = 'item-text' + (isDone ? ' is-done' : '');
        txt.textContent = item.text;
        body.appendChild(txt);

        // Meta
        const meta = document.createElement('div');
        meta.className = 'item-meta';

        // Assignee
        const awrap = document.createElement('div');
        awrap.className = 'assignee-wrap';

        const pill = document.createElement('button');
        pill.className = 'assignee-pill ' + am.cls;
        pill.innerHTML = `<span style="width:7px;height:7px;border-radius:50%;background:${am.dot};display:inline-block;flex-shrink:0"></span>${am.label}`;

        const dd = document.createElement('div');
        dd.className = 'a-dropdown';
        ['', 'evan', 'shiwei', 'both'].forEach(opt => {
          const m = AM[opt];
          const o = document.createElement('div');
          o.className = 'a-opt';
          o.innerHTML = `<span class="a-dot" style="background:${m.dot}"></span>${m.label}`;
          o.addEventListener('mousedown', e => {
            e.preventDefault(); e.stopPropagation();
            S.assignees[item.id] = opt;
            persist(); closeDD(); render(); updateProgress();
          });
          dd.appendChild(o);
        });

        pill.addEventListener('click', e => {
          e.stopPropagation();
          if (openDD && openDD !== dd) closeDD();
          dd.classList.contains('open') ? closeDD() : (dd.classList.add('open'), openDD = dd);
        });

        awrap.appendChild(pill);
        awrap.appendChild(dd);
        meta.appendChild(awrap);

        // Due date
        const dueWrap = document.createElement('div');
        dueWrap.className = 'due-wrap';
        const dueLbl = document.createElement('span');
        dueLbl.className = 'due-lbl';
        dueLbl.textContent = 'Due:';
        const dueIn = document.createElement('input');
        dueIn.type = 'date';
        dueIn.className = 'due-input ' + dueCls(dueVal);
        dueIn.value = dueVal;
        dueIn.addEventListener('click', e => e.stopPropagation());
        dueIn.addEventListener('change', e => {
          S.dues[item.id] = e.target.value;
          persist(); render(); updateProgress();
        });
        dueWrap.appendChild(dueLbl);
        dueWrap.appendChild(dueIn);
        meta.appendChild(dueWrap);

        body.appendChild(meta);

        // Comment
        const note = S.comments[item.id] || '';
        const commentArea = document.createElement('div');
        commentArea.className = 'comment-area';

        const toggle = document.createElement('button');
        toggle.className = 'comment-toggle' + (note ? ' has-note' : '');
        toggle.innerHTML = note
          ? `<span>✏️</span> Note`
          : `<span style="opacity:.5">＋</span> Add note`;

        const commentBox = document.createElement('div');
        commentBox.className = 'comment-box' + (note ? ' open' : '');

        const ta = document.createElement('textarea');
        ta.className = 'comment-textarea';
        ta.placeholder = 'Add a note, link, phone number, or any other details…';
        ta.value = note;
        ta.addEventListener('click', e => e.stopPropagation());
        ta.addEventListener('input', e => {
          S.comments[item.id] = e.target.value;
          persist();
          const hasNote = !!e.target.value;
          toggle.className = 'comment-toggle' + (hasNote ? ' has-note' : '');
          toggle.innerHTML = hasNote
            ? `<span>✏️</span> Note`
            : `<span style="opacity:.5">＋</span> Add note`;
        });

        commentBox.appendChild(ta);

        toggle.addEventListener('click', e => {
          e.stopPropagation();
          commentBox.classList.toggle('open');
          if (commentBox.classList.contains('open')) ta.focus();
        });

        commentArea.appendChild(toggle);
        commentArea.appendChild(commentBox);
        body.appendChild(commentArea);
        row.appendChild(box);
        row.appendChild(body);
        wrap.appendChild(row);
      });

      card.appendChild(wrap);
    }

    main.appendChild(card);
  });

  const footer = document.createElement('p');
  footer.className = 'footer';
  footer.textContent = 'Made with love 🌿 · Hillbrook Farm, December 2026';
  main.appendChild(footer);
}

function closeDD() {
  if (openDD) { openDD.classList.remove('open'); openDD = null; }
}
document.addEventListener('click', closeDD);

// ── FILTERS ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.f;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = 'filter-btn';
      if (b.dataset.f === activeFilter) b.classList.add('f-' + activeFilter);
    });
    render(); updateProgress();
  });
});

// Boot: load from Supabase, then render
loadFromSupabase(SK, S, onStateLoaded);
</script>
</body>
</html>
